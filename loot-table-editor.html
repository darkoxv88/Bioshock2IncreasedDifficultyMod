<!DOCTYPE html>

<head>
  <title>Loot table editor</title>
</head>

<body>
  <input type="file" name="file" id="file">
  <pre id='output'></pre>

  <script>
    document.getElementById('file').onchange = function() {
      const output = document.getElementById('output')
      const file = this.files[0];
      const openBracked = '(';
      const closeBracked = ')';

      async function copyToClipboard(text) {
        try 
        {
          await navigator.clipboard.writeText(text);
        } 
        catch (err) 
        {
          console.error('Failed to copy: ', err);
        }
      }

      class Item {
        constructor(className, pickupName, costMultiplier) {
          this.className = className;
          this.pickupName = pickupName;
          this.costMultiplier = typeof(costMultiplier) === 'number' ? costMultiplier : 1;
        }

        readStackSize(line) {
          return line.split('StackSize=')[1].split(',')[0];
        }

        readSupplySize(line) {
          if (!line.includes('SupplySize=')) {
            return '';
          }

          return ', SupplySize=' + line.split('SupplySize=')[1].split(',')[0].split(closeBracked)[0];
        }

        create(line) {
          const hacked = line.includes('DisplayWhenHacked=True');
          const cost = (((hacked ? 0.8 : 1) * 1.1) * this.costMultiplier).toFixed(3);
          const displayWhenUnHacked = hacked ? 'False' : 'True';
          const displayWhenHacked = hacked ? 'True' : 'False';

          return `VendingLootSpec=(ItemClass=class'${this.className}', PickupClass=class'${this.pickupName}', StackSize=${this.readStackSize(line)}`
            + `, CostAdjustment=${cost}, DisplayWhenUnHacked=${displayWhenUnHacked}, DisplayWhenHacked=${displayWhenHacked}`
            + this.readSupplySize(line) 
            + ')';
        }
      }

      const reader = new FileReader();
      reader.onload = async function(progressEvent) {
        const lines = this.result.split('\n');

        const targetItems = {
          'ShockDesignerClasses.MedHypo': new Item('ShockDesignerClasses.MedHypo', 'Pickups.MedHypo_Pickup', 1.1),
          'ShockDesignerClasses.BioAmmoHypo': new Item('ShockDesignerClasses.BioAmmoHypo', 'Pickups.EveHypo_Pickup', 1.1),
          'ShockGame.Drill_Ammo': new Item('ShockGame.Drill_Ammo', 'Pickups.DrillAmmo_Pickup', 1.0),
          'ShockGame.Rivet_Ammo': new Item('ShockGame.Rivet_Ammo', 'Pickups.StandardRivet_Pickup', 1.0),
          'ShockGame.Rivet_MagnumAmmo': new Item('ShockGame.Rivet_MagnumAmmo', 'Pickups.HighPowerRivet_Pickup', 1.0),
          'ShockGame.Rivet_TrapAmmo': new Item('ShockGame.Rivet_TrapAmmo', 'Pickups.TrapRivet_Pickup', 1.0),
          'ShockGame.Hacking_Ammo': new Item('ShockGame.Hacking_Ammo', 'Pickups.HackAmmo_Pickup', 1.0),
          'ShockGame.Hacking_AutoHackAmmo': new Item('ShockGame.Hacking_AutoHackAmmo', 'Pickups.AutoHackAmmo_Pickup', 1.0),
          'ShockGame.Hacking_TurretAmmo': new Item('ShockGame.Hacking_TurretAmmo', 'Pickups.TurretAmmo_Pickup', 1.0),
          'ShockGame.MachineGun_Bullet': new Item('ShockGame.MachineGun_Bullet', 'Pickups.SMG40Cal_Pickup', 1.0),
          'ShockGame.MachineGun_AntiPersonnelBullet': new Item('ShockGame.MachineGun_AntiPersonnelBullet', 'Pickups.SMGAntiPersonnel_Pickup', 1.0),
          'ShockGame.MachineGun_ArmorPiercingBullet': new Item('ShockGame.MachineGun_ArmorPiercingBullet', 'Pickups.SMGArmorPiercing_Pickup', 1.0),
          'ShockGame.Shotgun_00Buck': new Item('ShockGame.Shotgun_00Buck', 'Pickups.00Buck_Pickup', 1.0),
          'ShockGame.Shotgun_PhosphorusBuck': new Item('ShockGame.Shotgun_PhosphorusBuck', 'Pickups.PhosphorusBuck_Pickup', 1.0),
          'ShockGame.Shotgun_SolidSlug': new Item('ShockGame.Shotgun_SolidSlug', 'Pickups.SolidSlug_Pickup', 1.0),
          'ShockGame.Speargun_Spear': new Item('ShockGame.Speargun_Spear', 'Pickups.StandardSpear_Pickup', 1.0),
          'ShockGame.Speargun_RocketSpearAmmo': new Item('ShockGame.Speargun_RocketSpearAmmo', 'Pickups.RocketSpear_Pickup', 1.0),
          'ShockGame.Speargun_TrapSpearAmmo': new Item('ShockGame.Speargun_TrapSpearAmmo', 'Pickups.TrapSpear_Pickup', 1.0),
          'ShockGame.GrenadeLauncher_FragGrenade': new Item('ShockGame.GrenadeLauncher_FragGrenade', 'Pickups.FragGrenade_Pickup', 1.0),
          'ShockGame.GrenadeLauncher_StickyGrenade': new Item('ShockGame.GrenadeLauncher_StickyGrenade', 'Pickups.StickyGrenade_Pickup', 1.0),
          'ShockGame.GrenadeLauncher_RPG': new Item('ShockGame.GrenadeLauncher_RPG', 'Pickups.RPG_Pickup', 1.0),
        };

        for (var line = 0; line < lines.length; line++) {
          const targetLine = lines[line];

          if (!targetLine.includes('VendingLootSpec=')) {
            continue;
          } 

          for (let item in targetItems) {
            if (!targetLine.includes(item)) {
              continue;
            }

            lines[line] = targetItems[item].create(targetLine);
          }
        }

        const edited = lines.join('\n');

        copyToClipboard(edited);
        output.innerHTML = edited;
      };

      reader.readAsText(file);
    };
  </script>
</body>
