[DrillAmmo]
TopicType=Ammo Types
FriendlyName=Drill Fuel
bHidden=true
Entry=Drill Fuel is the only ammunition type for the Drill.
Entry=\nDrill Fuel enables the Drill to spin up for its more powerful attacks.

[StandardRivet]
TopicType=Ammo Types
FriendlyName=Rivet
bHidden=true
Entry=Rivets are the base ammunition type for the Rivet Gun.
Entry=\nThese Rivets do a moderate amount of piercing damage.

[MagnumRivet]
TopicType=Ammo Types
FriendlyName=Heavy Rivet
bHidden=true
Entry=Heavy Rivets are an alternate ammunition type for the Rivet Gun.
Entry=\nHeavy Rivets do a moderate amount of armor-piercing damage.  They are especially deadly with Headshots.

[TrapRivet]
TopicType=Ammo Types
FriendlyName=Trap Rivet
bHidden=true
Entry=Trap Rivets are an alternate ammunition type for the Rivet Gun.
Entry=\nWhen fired, Trap Rivets will embed in objects and shoot a secondary rivet when an enemy nears.  Use these to set traps for your foes. Unused Trap Rivets can be picked up and reused.

[00Buck]
TopicType=Ammo Types
FriendlyName=00 Buck
bHidden=true
Entry=00 Buck is the base ammunition type for the Shotgun.
Entry=\nThis basic buckshot for the Shotgun provides a devastating blast at short range.

[SolidSlug]
TopicType=Ammo Types
FriendlyName=Solid Slug
bHidden=true
Entry=Solid Slug is an alternate ammunition type for the Shotgun.
Entry=\nA single, solid shell, this ammunition is particularly effective against targets vulnerable to anti-personnel damage and can penetrate multiple targets.

[PhosphorusBuck]
TopicType=Ammo Types
FriendlyName=Phosphorus Buck
bHidden=true
Entry=Phosphorus Buck is an alternate ammunition type for the Shotgun.
Entry=\nThis powerful buckshot sticks to enemies, causing them to panic, and will explode after a short time.

[FragGrenade]
TopicType=Ammo Types
FriendlyName=Frag Grenade
bHidden=true
Entry=Frag Grenades are the base ammunition for the Launcher.
Entry=\nThese basic frag grenades are massively damaging, and have a significant blast radius.

[ProximityGrenade]
TopicType=Ammo Types
FriendlyName=Proximity Mine
bHidden=true
Entry=Proximity Mines are an alternate ammunition for the Launcher.
Entry=\nThese are effectively used as land-mines, staying primed and ready until an unwitting victim walks too close.

[RPG]
TopicType=Ammo Types
FriendlyName=Heat-seeking Rocket
bHidden=true
Entry=Heat-seeking Rockets are an alternate ammunition for the Launcher.
Entry=\nThese homing missiles are the perfect solution for moving targets, delivering a devastating payload even around corners!

[StandardSpear]
TopicType=Ammo Types
FriendlyName=Spear
bHidden=true
Entry=Spears are the base ammunition for the Speargun.
Entry=\nThese spears fly true even at long ranges.  They can be recovered from your fallen enemies.

[RocketSpear]
TopicType=Ammo Types
FriendlyName=Rocket Spear
bHidden=true
Entry=Rocket Spears are an alternate ammunition for the Speargun.
Entry=\nA spear equipped with a timed explosive device that will detonate after a short time.  The rocket trail will also set nearby objects on fire.

[TrapSpear]
TopicType=Ammo Types
FriendlyName=Trap Spear
bHidden=true
Entry=Trap Spears are an alternate ammunition for the Speargun.
Entry=\nThese ingenious spears shoot out an electrified tripwire when fired into a wall.

[MachineGunBullet]
TopicType=Ammo Types
FriendlyName=.50 Caliber Rounds
bHidden=true
Entry=.50 Caliber Rounds are the base ammunition for the Machine Gun.
Entry=\nThese bullets will do the job you want, if the job is spraying death at your enemies.

[MachineGunAntiPersonnelBullet]
TopicType=Ammo Types
FriendlyName=Anti-Personnel Rounds
bHidden=true
Entry=Anti-Personnel Rounds are an alternate ammunition for the Machine Gun.
Entry=\nThese bullets are specially designed to neutralize non-armored targets -- like Splicers.

[MachineGunArmorPiercingBullet]
TopicType=Ammo Types
FriendlyName=Armor-Piercing Rounds
bHidden=true
Entry=.Armor-Piercing Rounds are are an alternate ammunition for the Machine Gun.
Entry=\nThese bullets are particularly effective against metal or armored targets, like turrets, security bots and Big Daddies.
Entry=\nDue to their high penetration, they are capable of shooting through multiple, fleshy targets.

[DistanceHackAmmo]
TopicType=Ammo Types
FriendlyName=Hack Dart
bHidden=true
Entry=Hack Darts are the basic ammo for the Hack Tool and Allow you to hack machines at a distance.
Entry=\nFiring one at an unhacked machine will begin the Hacking Game.  If you succeed, the machine will become Hacked.
Entry=\nMisfired Hack Darts can be recovered from walls and other objects.

[AutoHackAmmo]
TopicType=Ammo Types
FriendlyName=Auto-Hack Dart
bHidden=true
Entry=Auto-Hack Darts are are an alternate ammunition for the Hack Tool.
Entry=\nBypasses a machine's defenses to automatically succeed at hacking.

[DeployableTurrets]
TopicType=Ammo Types
FriendlyName=Mini-Turrets
bHidden=true
Entry=Mini-Turrets are are an alternate ammunition for the Hack Tool.
Entry=\nThese thrown pods will deploy a small turret that will automatically fire at your enemies.
Entry=\nMini-Turrets have a limited lifespan and will automatically detonate after a set time.