[Firing]
TopicType=The Basics
FriendlyName=Firing Weapons
bHidden=false
Entry=Press <Mapping=Fire> to fire your current weapon. You can use weapons and Plasmids simultaneously.
Entry=\nThis will also automatically reload your weapon if it is empty and you have more ammo of the current type.

[UsingAbilities]
TopicType=The Basics
FriendlyName=Using Plasmids
bHidden=false
Entry=Press <Mapping=AltFire> to use your current Plasmid.  You can use Plasmids and weapons simultaneously.
Entry=\nUpgraded Plasmids are available later in the game.  Many of these feature a Charged Fire.  Press and hold <Mapping=AltFire> to charge up a Plasmid.

[QuickMelee]
TopicType=The Basics
FriendlyName=Quick Melee
bHidden=false
Entry=Press <Mapping=GunButtAndDash> for a quick melee attack.
Entry=\nAll ranged weapons support a quick gun butt attack.  Gun butt attacks do minimal damage, but are useful when low on ammo or cornered.
Entry=\nPress <Mapping=GunButtAndDash> with the Drill to swing it, rather than spin it.  This does substantially more damage than a gun butt and should be used as a fallback melee attack.

[ChangingWeapons]
TopicType=The Basics
FriendlyName=Switching Weapons
bHidden=false
Entry=Tap <Mapping=MouseWheelDownPressed> to switch your current weapon. 

[ChangingAbilities]
TopicType=The Basics
FriendlyName=Switching Plasmids
bHidden=false
Entry=Tap <Mapping=NextPlasmid> to switch your current Plasmid.

[HealthModel]
TopicType=The Basics
FriendlyName=Health and Damage
bHidden=false
Entry=There are many ways to come to harm in the city of Rapture.  Splicer attacks, long falls and elemental hazards such as fires will all lead to depleted health.
Entry=\nYour health reserves are represented by the red bar in the upper left hand corner of the screen.  As you take damage, the red area will gradually shrink.  If it is fully depleted, you will die.
Entry=\nYou can prevent this by using First Aid Kits, which can be found scattered around the city or purchased from a Vending Machine.  The number next to your Health Bar represents the number of First Aid Kits you are currently carrying.  You can carry a maximum of 5 by default.  Press <Mapping=ConsumeMedHypo> to use a First Aid Kit at any time.
Entry=\nYou can also restore health at a Health Station, though this costs Money.

[MedHypo]
TopicType=The Basics
FriendlyName=First Aid Kit
bHidden=true
Entry=A First Aid Kit instantly restores health when used, filling your red Health Bar.
Entry=\nThe number of First Aid Kits you have remaining is displayed along with the red bar at the top of the screen.  You can carry 5 by default.  Press <Mapping=ConsumeMedHypo> to use a First Aid Kit at any time.

[Resurrection]
TopicType=The Basics
FriendlyName=Vita-Chambers
bHidden=true
Entry=If you are killed by the hostile denizens of Rapture, you will be revived live and whole at the last Vita-Chamber you passed.  Some of your health will be restored, and you will always have at least a small amount of EVE.
Entry=\nVita-Chambers work automatically -- there is no need to activate them.
Entry=\nIf you are revived while you have a Little Sister with you, she will be found waiting for you outside the Vita-Chamber.  Remember to pick her up before moving on!

[DamageTypes]
TopicType=The Basics
FriendlyName=Damage Types
bHidden=true
Entry=Different types of ammunition are effective against different opponents.  Using the correct ammo for an enemy will kill them faster, and will leave you with more ammunition at the end of the fight.
Entry=\nFor example, Armor-Piercing bullets do more damage to metal opponents like Security Cameras and Turrets.  



[TheCityofRapture]
TopicType=World of Rapture
FriendlyName=The City of Rapture
bHidden=true
Entry=''I chose the impossible. I chose... Rapture. A city where the artist would not fear the censor. Where the scientist would not be bound by petty morality. Where the great would not be constrained by the small. And with the sweat of your brow, Rapture can become your city as well.'' -- Andrew Ryan
Entry=\nChristened on November 5th, 1946, Rapture is a spectacular undersea metropolis in the middle of the Atlantic Ocean. The city is the brainchild of Andrew Ryan, a wealthy industrialist who sought refuge from all forms of government regulation and censorship. The city of Rapture was built to attract the best and brightest minds of the surface world, giving them a fertile ground to advance their pursuits without constraints, and for the free market to flourish unhindered.
Entry=\nRapture is comprised of many buildings rooted to the ocean floor, spreading out for miles to rival the size of any city on the surface. After the trains of the Atlantic Express fell out of favor, Rapture citizens began traveling via bathyspheres, a system of miniature submarines. Fresh oxygen is provided by the tree farms of the Arcadia district, and Hephaestus Core provides power from massive geothermal vents on the sea floor.

[TheFallOfRapture]
TopicType=World of Rapture
FriendlyName=The Fall of Rapture
bHidden=true
Entry=The city of Rapture prospered for some years after its founding, until the substance ADAM began to change its citizens, gene by gene. ADAM became the society's most valuable commodity -- after someone spliced it up, they had to get more and more just to keep themselves from falling apart.
Entry=\nAround this time, a con man named Frank Fontaine began offering social services to the poor and downtrodden in Rapture, working against Ryan's principles of self-sufficiency. Additionally, Fontaine invested in illicit activities, like smuggling goods from the surface. After numerous clashes with Ryan Security, Fontaine was reported killed.
Entry=\nAround this time, a mysterious figure named Atlas appeared and rallied the masses to rise up and overthrow Ryan in an attempt to take the city of Rapture for themselves. Between the struggles over the ADAM supply and the revolutionary violence aimed at Ryan and his followers, Rapture was torn apart from the inside. 
Entry=\nThese tensions erupted into civil war on New Year's Eve, 1959, when Atlas's followers staged an attack at the Kashmir Restaurant.  Soon fighting spread to the streets and swept across Rapture. When the dust finally settled over a year later, Fontaine, Ryan, and Atlas were all dead. The battle-scarred halls of Rapture were populated only by wandering Splicers, desperately scrounging in the rubble for that rare ADAM fix.

[Vending]
TopicType=World of Rapture
FriendlyName=Circus of Values
bHidden=true
Entry=The Circus of Values Vending Machine offers a variety of items for sale, often including ammunition, first aid kits and EVE hypos.  Each machine will offer a different selection of items.
Entry=\nMost Vending Machines have items at the bottom that will only become available if you successfully hack the machine.  A successful hack will also reduce the prices of all available goods.  Hacking is often the only way to get rarer types of ammo and supplies from a Circus of Values machine.
Entry=\nGetting a BLUE BONUS section while hacking a Circus of Values will cause a free item to drop from from the slot below.  Be sure to pick it up before you move on.

[Ammo]
TopicType=World of Rapture
FriendlyName=Ammo Bandito
bHidden=true
Entry=An Ammo Bandito Vending Machine offers a variety of ammunition for sale.
Entry=\nMost Ammo Vending Machines have a limited selection of rare ammo types.  A successful hack will reduce the prices of all available ammunition, and may lead to a few new items being revealed.
Entry=\nGetting a BLUE BONUS section while hacking an Ammo Bandito will cause a free item to drop from the slot below.  Be sure to pick it up before you move on.

[Health]
TopicType=World of Rapture
FriendlyName=Health Stations
bHidden=true
Entry=Health Stations cost a fair amount of money but completely refill your health bar when used.
Entry=\nYour enemies can also employ these Health Stations.  If you see a Splicer fleeing when badly wounded, he or she is probably running to heal at a nearby Health Station.
Entry=\nSuccessfully hacking a Health Station lowers the price of healing, and will cause that particular station to kill any Splicers who try to use it.
Entry=\nDestroying a Health Station will cause a First Aid Kit to spill out, but the station itself will become unusable.
Entry=\nGetting a BLUE BONUS section while hacking will cause a free First Aid Kit to drop from the machine.  Be sure to pick it up before you move on.

[Container]
TopicType=World of Rapture
FriendlyName=Searchable Containers
bHidden=true
Entry=There are still many useful items hidden around Rapture in searchable Containers like desks, cabinets and shipping crates.  Press <Mapping=Use> to open a Container.  Once open, press <Mapping=Use> again to take its contents.
Entry=\nYou can find ammo, First Aid Kits, EVE Hypos and other supplies by searching Containers.
Entry=\nIf you have already searched and emptied a Container, the name of the Container will be gray and there will be no prompt to open it.

[Corpse]
TopicType=World of Rapture
FriendlyName=Corpses
bHidden=true
Entry=Corpses, whether created by your own hand or some other accident of Rapture, often have useful items on them, such as ammo, First Aid Kits, EVE Hypos and other supplies.  
Entry=\nPress <Mapping=Use> to search a corpse.  Then press <Mapping=Use> again to take the contents.
Entry=\nMost enemies carry at least a little ammo and cash, so be sure to search your fallen foes before moving on.
Entry=\nIf you have already searched and emptied a corpse, the name of the corpse will be gray and there will be no prompt to search it.

[Log]
TopicType=World of Rapture
FriendlyName=Diaries
bHidden=true
Entry=Diaries are messages recorded by the people of Rapture, either as notes for themselves or as messages for other residents.
Entry=\nPress and hold <Mapping=PlayOldestUnreadLog> to play the last diary you picked up.  You can access a full list of diary messages from the <Mapping=ShowHelp> menu, from which you can play back diaries that you've previously acquired.

[Money]
TopicType=World of Rapture
FriendlyName=Money
bHidden=true
Entry=Money is used primarily to purchase items at Vending Machines, but it can also be used to Buyout a hack or get health from Health Stations.

[Radio]
TopicType=World of Rapture
FriendlyName=Radio/Camera
bHidden=true
Entry=The Radio and Camera built into your suit allow your friends back at the train to see through your eyes and communicate with you inside Rapture.

[Present]
TopicType=World of Rapture
FriendlyName=Reward from the Little Sisters
bHidden=true
Entry=These pink teddy bears contain gifts for saving Little Sisters, placed on the girls' behalf.  They can always be found beside the nearest Gatherer's Garden machine.
Entry=\nThey may have Tonics, ADAM or other useful supplies inside, so be sure to pick them up if someone tells you the Little Sisters have dropped one off.

[Safe]
TopicType=World of Rapture
FriendlyName=Safes
bHidden=true
Entry=Safes are securely-locked containers.  The only way to open them is to hack them (or buy out the hack), but they always contain valuable items.
Entry=\nSafes typically present the most difficult hacks in the world of Rapture.
Entry=\nGetting a BLUE BONUS section while hacking a Safe will cause gain you a bit of extra Cash when you complete the hack.

[DoorControl]
TopicType=World of Rapture
FriendlyName=Door Control Panels
bHidden=true
Entry=Some doors can only be opened by hacking a nearby Door Control Panel.  Keep an eye out for these throughout Rapture -- they usually hide valuables behind them.

[Dispenser]
TopicType=World of Rapture
FriendlyName=Tool Dispensers
bHidden=true
Entry=Dispensers were installed in certain areas of Rapture to aid in common tasks. They will produce one kind of tool -- use them to resupply if necessary.

[Machines]
TopicType=World of Rapture
FriendlyName=Machines
bHidden=true
Entry=Machines in BioShock do various things.


[Adam]
TopicType=The Power of ADAM
FriendlyName=What is ADAM?
bHidden=true
Entry=The miracle-working genetic elixir of Rapture, ADAM has the ability to rewrite a person's genetic code from the ground up. When imprinted with a Plasmid, ADAM can do anything from changing a person's physical appearance, to conferring incredible powers like shooting fire from the fingertips or turning the body invisible to the naked eye.
Entry=\nA number of years after the founding of Rapture, the potential of ADAM was discovered by Doctor Tenenbaum. The substance is secreted by a previously unknown type of deep-sea slug, then processed into usable form and injected into the human body. Everyone in Rapture began using ADAM to improve themselves, making it the most valuable commodity in the city.
Entry=\nWhen someone who has spliced up ADAM can't maintain a constant supply, their bodies and minds begin falling apart. They crave ADAM more and more, eventually turning into so-called ''Splicers,'' who care only for their next fix.  

[GettingAdam]
TopicType=The Power of ADAM
FriendlyName=Getting ADAM
bHidden=true
Entry=The fall of Rapture was caused by the populace's lust for ADAM.  The citizens fought each other for it, eventually degenerating into junkie-like ''Splicers,'' who would do anything for it.
Entry=\nDue to ADAM's immense value, it is extremely hard to come by in Rapture.  Most of the available ADAM comes directly from the veins of fallen Splicers.  Little Sisters can extract it directly from dead Splicers, reprocessing it into usable ADAM that can be turned into Plasmids, Tonics and other genetic wonders at a Gatherer's Garden machine.
Entry=\nDealing with Little Sisters is the ONLY way to get ADAM now.  But, every Little Sister has a formidable protector between you and that ADAM in the form of a Big Daddy.  You must defeat him first to get access to the Little Sister.
Entry=\nWhat you do then is your choice.  You can Harvest her on the spot for a large ADAM reward, though she will not survive the process.  You can Adopt her and use her to Gather smaller amounts of ADAM.  Or, you can take her to a Vent and Save her.  This cures her of the dream-like servitude of being a Little Sister, turning her into a normal little girl and netting you a smaller amount of ADAM as a reward.

[ActivePlasmidOverview]
TopicType=The Power of ADAM
FriendlyName=Plasmids
bHidden=true
Entry=Plasmids alter your genes to give you new abilities.  These abilities include setting Splicers and objects on fire, causing security systems to attack your enemies, shocking your foes with electricity, creating deadly traps ... and more.
Entry=\nTo use your Plasmid powers, press <Mapping=AltFire> to use your current Plasmid.
Entry=\nYou can cycle your current Plasmid by tapping <Mapping=NextPlasmid>.
Entry=\nAll Plasmids require EVE to use.  As you use Plasmids, your blue EVE bar in the top left corner of the screen will grow shorter.
Entry=\nThere are many different Plasmids available, each with different abilities and effects.  Upgrades add more power, cheaper EVE costs and new abilities!  You can purchase Plasmid Upgrades with ADAM at a Gatherer's Garden.

[EveOverview]
TopicType=The Power of ADAM
FriendlyName=EVE
bHidden=true
Entry=EVE is the genetic substance that powers Plasmids.  All Plasmids require EVE to use and cannot be used if you run out.
Entry=\nYour current supply of EVE is represented by the blue EVE Bar in the top left corner of the screen.  It will gradually deplete as you use Plasmids.  If you run out completely, your Plasmid hand will not appear on screen.
Entry=\nEVE can be restored by applying blue EVE Hypos, which can be found or purchased all over Rapture.  The number of EVE hypos you have remaining is displayed along with the EVE Bar at the top of the screen.  You can carry 5 by default.
Entry=\nEVE Hypos are used automatically when your EVE Bar is depleted.


[EveHypo]
TopicType=The Power of ADAM
FriendlyName=Restoring EVE
bHidden=true
Entry=An EVE Hypo fully fills your EVE bar (no matter what its current level), so that you can use your Plasmids.  
Entry=\nYour current supply of EVE is represented by the blue EVE Bar in the top left corner of the screen.  It will gradually deplete as you use Plasmids.  If you run out completely, your Plasmid hand will not appear on screen.

[PhysicalPlasmidOverview]
TopicType=The Power of ADAM
FriendlyName=Gene Tonics
bHidden=true
Entry=Gene Tonics alter your genes to improve all sorts of abilities -- stronger attacks, improved damage resistance, reduced EVE usage, even cheaper prices at the Circus of Values!  Tonics allow you to customize your traits and tailor your play experience to your own style.
Entry=\nGene Tonics are PASSIVE, meaning they have their effect automatically when installed.  You do not need to manually activate them.
Entry=\nYou can increase the number of Gene Tonics available to you at once, by buying Gene Tonic Slots at a Gatherer's Garden using ADAM from LITTLE SISTERS.  More Tonics means more power!
Entry=\nIf you install multiple versions of a Gene Tonic, their effects will be cumulative.

[AdamUpgrades]
TopicType=The Power of ADAM
FriendlyName=Upgrades with ADAM
bHidden=true
Entry=ADAM can also be used to improve your most basic traits permanently.  
Entry=\nYou can purchase various Upgrades with a variety of permanent effects -- more health to survive combat, more EVE for longer Plasmid use, even new Plasmid and Tonic Slots to allow you to equip more of each at any time.  There may be more than one of each of these available for purchase at any given time.
Entry=\nAll of these cost ADAM, however, and you will need to face off against Big Daddies to gain access to the Little Sisters that possess it.


[PlasmidEquip]
TopicType=The Power of ADAM
FriendlyName=Using the Gene Bank
bHidden=true
Entry=You can only equip a set number of Plasmids and Tonics at any given time.  Vistiting a Gene Bank allows you customize your currently equipped Plasmids and Tonics, swapping out your current set for others.  Any PLASMID or GENE TONIC you've collected thus far will always be available at the Gene Bank.  You can also use the Gene Bank simply to review your collection of Plasmids and Tonics.
Entry=\nPlasmids and Tonics are equipped in different Slots.  To review your Plasmids and Tonics or to swap one in or out, first select the set you're interested in.
Entry=\nNext, select the Plasmid or Tonic that you'd like to swap out.  Finally, review your list of collected Plasmids or Tonics for that track, and select the one you'd like to equip.  You can always reinstall the one you just removed, if you still like that one best.
Entry=\nYou can equip more Plasmids and Tonics at once by purchasing Slot Upgrades at a Gatherer's Garden.


[GrowthStation]
TopicType=The Power of ADAM
FriendlyName=Using the Gatherer's Garden
bHidden=true
Entry=While a few Plasmids and Tonics can be found scattered around the halls of Rapture, you will need to spend your hard-earned ADAM to get most of them.  Visit a Gatherer's Garden to spend ADAM on new Plasmids, Gene Tonics and Upgrades.
Entry=\nEach Gatherer's Garden offers upgrades to your maximum Health and EVE, as well as additional Plasmid Slots and Tonic Slots in which you can install Plasmids and Gene Tonics. Supplies of these are limited, but there may be more than one available at a single Gatherer's Garden.
Entry=\nAs you move through Rapture, new Plasmids, Tonics and Upgrades will constantly appear in the Gatherer's Garden.  If you encounter a new one, be sure to check it to see what's available.  There may be a few surprise.
Entry=\nPlasmid Upgrades are ONLY available at a Gatherer's Garden, so you'll need to get ADAM if you want the most powerful Plasmids in Rapture.


[TelekinesisBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Telekinesis
bHidden=true
Entry=The Telekinesis Plasmid allows you to reach out with your mind and move objects!
Entry=\nPress and hold <Mapping=AltFire> to pull objects toward you.  Keep <Mapping=AltFire> held to hold on to the object.  Release <Mapping=AltFire> to throw the object with great force!
Entry=\nHolding <Mapping=AltFire> then pressing <Mapping=TKShield> will hold the object in front of your reticle, allowing you to use it as a shield. You can also drop a held object by pressing <Mapping=HandleReload> at any time.
Entry=\nTelekinesis can be used as a weapon when you are low on ammo.  Heavier objects, such as a cash register, can be extremely devastating.  Held objects can be picked up or searched, so it is also useful for grabbing hard to reach items.

[TelekinesisAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Telekinesis 2
bHidden=true
Entry=The Telekinesis 2 Plasmid allows you to throw objects with even greater force for increased damage!
Entry=\nPress and hold <Mapping=AltFire> to pull objects toward you.  Keep <Mapping=AltFire> held to hold on to the object.  Release <Mapping=AltFire> to throw the object with great force!  
Entry=\nReleasing <Mapping=AltFire> halfway will move the object in front of your reticle, allowing you to use it as a shield. You can also drop a held object by pressing <Mapping=HandleReload> at any time.
Entry=\nTelekinesis can be used as a weapon when you are low on ammo.  Heavier objects, such as a cash register, can be extremely devastating.  Held objects can be picked up or searched, so it is also useful for grabbing hard to reach items.


[TelekinesisMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Telekinesis 3
bHidden=true
Entry=The Telekinesis 3 Plasmid adds the ability to pick up smaller enemies, such as Leadhead and Houdini Splicers!  Enemies are at your mercy while held, so use your power responsibly.
Entry=\nPress and hold <Mapping=AltFire> to pull objects or enemies toward you.  Hold <Mapping=AltFire> down to hold on to the object.  Release <Mapping=AltFire> to throw the object with great force!  Thrown enemies take substantial damage on impact.
Entry=\nReleasing <Mapping=AltFire> halfway will move the object in front of your reticle, allowing you to attack Splicers with your weapons while held. You can also drop a held object by pressing <Mapping=HandleReload> at any time.
Entry=\nTelekinesis can be used as a weapon when you are low on ammo.  Heavier objects, such as cash registers, can be extremely devastating.  Held objects can be picked up or searched, so it is also useful for grabbing hard-to-reach items.  With the added power to pick up smaller enemies, Telekinesis 3 is one of the most powerful Plasmids in Rapture.

[ElectroboltBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Electro Bolt
bHidden=true
Entry=The Electro Bolt Plasmid allows you to shoot a high-voltage arc of electricity from your fingertips.
Entry=\nPress <Mapping=AltFire> to fire Electro Bolt.
Entry=\nElectro Bolt shocks and stuns enemies for a short time.  Though this does not do damage by itself, foes are vulnerable while shocked and take increased damage from melee attacks.  Hit a shocked enemy with a swift swing of your Drill for maximum effectiveness.
Entry=\nElectro Bolt can also be used on the many pools of standing water that can be found in Rapture.  Shocking a pool of water creates a deadly trap -- anyone caught in it will take a large amount of damage, if they aren't killed outright.
Entry=\nElectro Bolt is also highly effective on machines and security elements such as Bots, Turrets and Cameras.  A shock of electricty will shut them down for a short while, leaving them open to attacks or hacking.

[ElectroboltAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Electro Bolt 2
bHidden=true
Entry=The Electro Bolt 2 Plasmid adds the ability to charge up a more powerful burst of Chain Lightning that can shock multiple foes.
Entry=\nPress <Mapping=AltFire> to fire a normal Electro Bolt.  Press and hold <Mapping=AltFire> to charge up Chain Lightning and release <Mapping=AltFire> once it is fully charged to fire it off.
Entry=\nChain Lightning has all the same effects as Electro Bolt -- it will stun man and machine and do devastating damage in water.  However, it will also arc between multiple targets automatically, stunning them all.  This makes it an ideal tool for defending yourself against multiple foes at once.

[ElectroboltMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Electro Bolt 3
bHidden=true
Entry=The Electro Bolt 3 Plasmid upgrades the basic usage of Chain Lightning and allows you to charge up a powerful Electrical Storm.
Entry=\nPress <Mapping=AltFire> to fire off Chain Lightning.  As with Electro Bolt 2, Chain Lightning will arc between targets automatically, stunning them all -- now without the need to charge up!
Entry=\nPress and hold <Mapping=AltFire> to charge up a continuous Electrical Storm.  While <Mapping=AltFire> is held, you will fire huge arcs of electricity from your hand, shocking and damaging any who stand in your way.  Be careful, though, this consumes EVE at an alarming rate.

[ScoutBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Scout
bHidden=true
Entry=The Scout Plasmid allows you to leave your body behind and explore the world of Rapture in safety!
Entry=\nPress <Mapping=AltFire> with Scout equipped to enter Scout Mode. Use Scout to look ahead for danger and get the drop on Splicers and Security.
Entry=\nYou can even use Plasmids while you are Scouting.  You can only use two Plasmid attacks to start, but upgrades to Scout allow you to use more!
Entry=\nUsing two Plasmids will force you back to your body a short while later.  You can also jump back any time by pressing <Mapping=ExitScout>.
Entry=\nYour body will be more difficult for Splicers to detect while you are using Scout, but you should hide yourself as best you can before you go Scouting. 


[ScoutAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Scout 2
bHidden=true
Entry=The Scout 2 Plasmid allows you to use additional Plasmid attacks while in Scout Mode, and grants the ability to proximity hack machines!
Entry=\nPress <Mapping=AltFire> with Scout equipped to enter Scout Mode.  Use Scout to look ahead for danger and get the drop on Splicers and Security.
Entry=\nYou can even use Plasmids while you are Scouting.  Scout 2 allows you to use three Plasmid attacks before behing forced back to your body.  As before, you can also jump back any time by pressing <Mapping=ExitScout>.
Entry=\nYour body will be more difficult for Splicers to detect while you are using Scout, but you should hide yourself as best you can before you go Scouting. 
Entry=\nScout 2 also adds the ability to hack in complete safety!  Simply approach any hostile machine while in Scout Mode and press <Mapping=HackHarvestAndExitScout> to begin hacking it.  This costs a small amount of EVE and failing the hack will force you back to your body automatically.

[ScoutMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Scout 3
bHidden=true
Entry=Scout3 has been cut!  No one should ever see this.

[WinterblastBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Winter Blast
bHidden=true
Entry=The Winter Blast Plasmid allows you to shoot a supercooled burst from your fingertips, freezing Splicers solid.
Entry=\nPress <Mapping=AltFire> to fire Winter Blast.
Entry=\nFrozen enemies are effectively immobilized for the time they are frozen.  They can also be shattered if you can do enough damage before they thaw.  The normal enemy health bar will have a frozen overlay, showing how much damage you must do to shatter them.
Entry=\nWinter Blast can also be used on enemy machines, such as Bots, Cameras and Turrets, to slow down the speed of the Hack Game.

[WinterblastAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Winter Blast 2
bHidden=true
Entry=The Winter Blast 2 Plasmid adds the ability to charge up a more powerful blast, which will encase enemies in a solid Ice Block.
Entry=\nPress <Mapping=AltFire> to fire a normal Winter Blast.  Press and hold <Mapping=AltFire> to charge up an Ice Block and release <Mapping=AltFire> once it is fully charged to fire it off.
Entry=\nEnemies frozen in an Ice Block are frozen for longer periods of time and leave behind Loot when shattered, in the form of a Lockbox.  An Ice Block will also send out freezing shards when shattered, which will freeze any enemy that they hit.
Entry=\nIce Blocks can also be affected by strong physical forces, such as Telekinesis 2 or Rocket Spears.

[WinterblastMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Winter Blast 3
bHidden=true
Entry=The Winter Blast 3 Plasmid upgrades the basic usage to Ice Block and allows you to charge up a powerful Icicle Assault.
Entry=\nPress <Mapping=AltFire> to fire off an Ice Block instantly.  As with Winter Blast 2, enemies sealed in an Ice Block are frozen for longer and will leave behind loot -- now without the need to charge up!
Entry=\nPress and hold <Mapping=AltFire> to charge up a continuous Icicle Assault.  While <Mapping=AltFire> is held, you will fire a continuous blast of freezing cold shards, which freeze enemies and do continual damage.  Be careful, though, this consumes EVE at an alarming rate.

[IncinerationBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Incinerate! 
bHidden=true
Entry=The Incinerate! Plasmid allows you set objects and enemies on fire with the power of your mind.
Entry=\nPress <Mapping=AltFire> to fire Incinerate!
Entry=\nEnemies and objects that are caught on fire will take continual damage for a short time.  Some enemies may run to water when caught ablaze, making for an ideal opportunity to hit them with Electro Bolt.
Entry=\nFire will spread naturally through Rapture.  Once a single foe has been caught on fire, it may spread to other objects and enemies.  Beware -- fire can hurt you as well!


[IncinerationAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Incinerate! 2
bHidden=true
Entry=The Incinerate! 2 Plasmid adds the ability to charge up a more powerful Fire Bomb that explodes over a much larger area.
Entry=\nPress <Mapping=AltFire> to fire Incinerate! normally.  Press and hold <Mapping=AltFire> to charge up a Fire Bomb and release <Mapping=AltFire> once it is fully charged to fire it off.
Entry=\nEnemies hit with a Fire Bomb burn hotter and longer, taking more damage while they are on fire.  It also explodes over a much larger area, meaning multiple foes may be hit with a single blast.

[IncinerationMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Incinerate! 3
bHidden=true
Entry=The Incinerate! 3 Plasmid upgrades the basic usage to a Fire Bomb and allows you to charge up a continuous Eruption of flames.
Entry=\nPress <Mapping=AltFire> to fire off a Fire Bomb.  As with Incinerate! 2, Fire Bombs do more damage and burn longer --- now without the need to charge up!
Entry=\nPress and hold <Mapping=AltFire> to charge up a continuous eruption of flames.  While <Mapping=AltFire> is held, your hand will essentially function as a powerful flamethrower, setting anything in front of you on fire and doing large amounts of direct damage.  Be careful, though, this consumes EVE at an alarming rate.

[CycloneTrapBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Cyclone Trap
bHidden=true
Entry=The Cyclone Trap Plasmid allows you place deadly traps on any ground surface.
Entry=\nPress <Mapping=AltFire> to place a Trap on the ground.  The trap will be placed in the location of the green reticle.
Entry=\nTraps are automatically set off when a hostile enemy walks near.  The Trap will detonate, throwing them up into the air and hurting them badly when they hit the ground.
Entry=\nTraps are perfect for defensive situations like Gathering ADAM with a Little Sister.  Traps will never detonate against neutral Big Daddies, so you can feel free to use them to cover doorways and other bottlenecks.

[CycloneTrapAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Cyclone Trap 2
bHidden=true
Entry=The Cyclone Trap 2 Plasmid adds the ability to charge your standard Traps with almost any other Plasmid, leading to a variety of different effects when triggered.
Entry=\nPress <Mapping=AltFire> to place a Trap on the ground.  The trap will be placed in the location of the green reticle.
Entry=\nSwitch to another Plasmid and fire it at the Trap, using <Mapping=AltFire>, or approach the Trap and press <Mapping=Use>.  The Trap will be charged with this secondary effect.  
Entry=\nCharged Traps release their power when triggered by a nearby enemy.  For example, a Trap charged with Incinerate! will explode in flames, while a Trap charged with Telekinesis will suspend an enemy in the air for a short time.  Experiment with all your Plasmids for a variety of effects!

[CycloneTrapMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Cyclone Trap 3
bHidden=true
Entry=The Cyclone Trap 3 Plasmid adds the ability to place (and charge) Traps on walls and ceilings!
Entry=\nPress <Mapping=AltFire> to place a Trap.  The trap will be placed in the location of the green reticle.
Entry=\nSwitch to another Plasmid and fire it at the Trap, using <Mapping=AltFire>, or approach the Trap and press <Mapping=Use>.  The Trap will be charged with this secondary effect.  
Entry=\nCharged Traps release their power when triggered by a nearby enemy.  For example, a Trap charged with Incinerate! will explode in flames, while a Trap charged with Telekinesis will suspend an enemy in the air for a short time.  Experiment with all your Plasmids for a variety of effects!

[DecoyBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Decoy
bHidden=true
Entry=The Decoy Plasmid creates a temporary duplicate of yourself to attract enemy attention and draw fire.
Entry=\nPress <Mapping=AltFire> to place a Decoy.
Entry=\nMost enemies will be drawn to attack the Decoy rather than you, making it ideal for situations when you are feeling overwhelmed.
Entry=\nYou can only place one Decoy at a time and it only lasts for a short while.  Placing a second Decoy will automatically destroy the first.

[DecoyAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Decoy 2
bHidden=true
Entry=The Decoy 2 Plasmid upgrades your Decoy to reflect damage from incoming attacks back at your foes.
Entry=\nPress <Mapping=AltFire> to place a Decoy.
Entry=\nA portion of any damage done to the Decoy will be reflected back at the attacker automatically.

[DecoyMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Decoy 3
bHidden=true
Entry=The Decoy 3 Plasmid upgrades your Decoy to reflect damage and give a portion of it back to you as health.
Entry=\nPress <Mapping=AltFire> to place a Decoy.
Entry=\nA portion of any damage done to the Decoy will be reflected back at the attacker automatically.  You will automatically absorb part of this damage as Health, which will be added to your health bar in the upper left of the screen.

[HypnotizeBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Hypnotize
bHidden=true
Entry=The Hypnotize Plasmid allows you to confuse your enemies into attacking each other.
Entry=\nPress <Mapping=AltFire> to fire Hypnotize.
Entry=\nEnemies hit with Hypnotize will be clearly marked with a red effect.  While this effect lasts, they will attack anyone nearby -- friend or foe.  Use Hypnotize against crowds of Splicers to get them to fight amongst themselves!
Entry=\nBe careful of using this against solitary enemies.  If there is no one else around to fight, they will still come after you!

[HypnotizeAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Hypnotize 2
bHidden=true
Entry=The Hypnotize 2 Plasmid adds the ability to Befriend smaller Splicers temporarily.
Entry=\nPress <Mapping=AltFire> to fire a normal Hypnotize ball.  As before, this will confuse your foes and get them to attack anyone nearby.
Entry=\nPress and hold <Mapping=AltFire> to charge up Hypnotize until it turns green and then release <Mapping=AltFire> to Befriend a Splicer.
Entry=\nBefriended Splicers will be clearly marked with a green effect and will follow and fight with you for a limited time.  Hypnotize 2 only works on Thuggish, Leadhead, Spider and Houdini Splicers.  Upgrade to Hypnotize 3 to make friends with Big Daddies and Brutes.
Entry=\nAttacking your new friend may cause him or her to turn on you and the effect will eventually wear off, so watch your back!

[HypnotizeMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Hypnotize 3
bHidden=true
Entry=The Hypnotize 3 Plasmid adds the ability to Befriend Big Daddies and Brutes, as well as all other types of Splicers.
Entry=\nPress <Mapping=AltFire> to fire a normal Hypnotize ball.  As before, this will confuse your foes and get them to attack anyone nearby.
Entry=\nPress and hold <Mapping=AltFire> to charge up Hypnotize until it turns green and then release <Mapping=AltFire> to Befriend your target.
Entry=\nBefriended foes will be clearly marked with a green effect and will follow and fight with you for a limited time.  Hypnotize 3 works on all the residents of Rapture, except for the Big Sisters.
Entry=\nAttacking your new friend may cause him or her to turn on you and the effect will eventually wear off, so watch your back!

[SecurityCommandBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Security Command
bHidden=true
Entry=The Security Command Plasmid allows you to distract enemy security, command your own friendly bots, and tag enemies as targets for all Rapture Security.
Entry=\nPress <Mapping=AltFire> to fire Security Command.
Entry=\nHitting an enemy with Security Command will cause him to become a target for all Security in Rapture, regardless of whether you have hacked it.  This is especially useful for hitting a Splicer wandering past an unhacked Camera, or commanding your own bots to take on a target from afar.
Entry=\nSecurity Command can also be used to distract enemy security elements.  Cameras and Turrets will pay attention to wherever Security Command landed and ignore everything else for a short while.
Entry=\nLastly, Security Command can be used to command your own hacked bots to do exactly what you want.  They will prioritize any target hit with Security Command and fly to distant locations that you tag with the Plasmid.  Use Security Command to get your bots to scout ahead and clear a path for you!

[SecurityCommandAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Security Command 2
bHidden=true
Entry=The Security Command 2 Plasmid adds the ability to summon a friendly bot at any time -- without the need to set of an alarm or hack it.
Entry=\nPress <Mapping=AltFire> to fire Security Command as before, and command the attention of all security in Rapture.
Entry=\nPress and hold <Mapping=AltFire> for a short time to automatically summon a friendly bot.  Remember that you can only control two bots at a time, so your oldest companion will automatically fly off if you summon a third.
Entry=\nSummoned bots will fight by your side until their death.  They also recieve specific names when they are summoned.  If you want to keep your friends alive longer, invest in the Handyman Tonic to gain the ability to repair friendly bots.

[SecurityCommandMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Security Command 3
bHidden=true
Entry=The Security Command 3 Plasmid adds the ability to summon the strongest security bots in Rapture -- the Elite Security Bot.
Entry=\nPress <Mapping=AltFire> to fire Security Command as before, and command the attention of all security in Rapture.
Entry=\nPress and hold <Mapping=AltFire> for a short time to automatically summon a friendly bot.  Remember that you can only control two bots at a time, so your oldest companion will automatically fly off if you summon a third.
Entry=\nSummoned bots will fight by your side until their death and bots summoned with Security Command 3 are substantially stonger and more durable than any standard security bot.  They also recieve specific names when they are summoned.  If you want to keep your friends alive longer, invest in the Handyman Tonic to gain the ability to repair friendly bots.

[SwarmBasicPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Insect Swarm
bHidden=true
Entry=The Insect Swarm Plasmid allows you to summon a swarm of deadly bees to seek out and attack nearby foes.
Entry=\nPress <Mapping=AltFire> to summon an Insect Swarm.
Entry=\nAn Insect Swarm will automatically seek out nearby enemies and swarm around them, causing damage over time and often confusing their actions.
Entry=\nInsects Swarms last for a limited amount of time.  If a Swarm's target is killed, it will continue to seek out new enemies until it disperses.

[SwarmAdvancedPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Insect Swarm 2
bHidden=true
Entry=The Insect Swarm 2 Plasmid will summon a more aggressive Insect Swarm that splits up between multiple targets and does additional damage.
Entry=\nPress <Mapping=AltFire> to summon an Insect Swarm.
Entry=\nSwarms summoned from Insect Swarm 2 will spread between targets, splitting in two to attack multiple foes at once.  

[SwarmMasterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Insect Swarm 3
bHidden=true
Entry=The Insect Swarm 3 Plasmid adds a new ability to your swarms -- any enemy killed by it becomes a deadly Swarm Bomb.
Entry=\nPress <Mapping=AltFire> to summon an Insect Swarm.
Entry=\nAs in Insect Swarm 2, Swarms summoned from Insect Swarm 3 will spread between targets, splitting in two to attack multiple foes at once.  However, any enemy killed by Insect Swarm 3 becomes a deadly Swarm Bomb.  Enemies who tread close to this corpse will trigger yet another Swarm to come attack.

[SummonBigSisterPlasmid]
TopicType=Plasmid Descriptions
FriendlyName=Summon Eleanor
bHidden=true
Entry=The Summon Eleanor Plasmid allows you to call on your now-grown Little Sister for help during combat.
Entry=\nPress <Mapping=AltFire> to summon Eleanor.
Entry=\nEleanor will start by targeting any enemy you hit with the Plasmid.  However, she will stand by your side, continuing to fight any who get in your way, for the duration of the Plasmid's effect.  While she is summoned, she can be retargeted by hitting another foe with the Plasmid.
Entry=\nEleanor's Big Sister suit and years of ADAM ingestion make her a powerful ally who can even the odds in even the most overwhelming combat situation.


[RoleOfBigDaddy]
TopicType=Big Daddies and Little Sisters
FriendlyName=Big Daddies
bHidden=true
Entry=From the time of its founding, the maintenance of Rapture required trained divers in reinforced suits to walk the sea floor, shoring up leaks and reinforcing the city's superstructure. When ADAM became the driving force in Rapture and Little Sisters were developed to reclaim the priceless resource from dead bodies, the inhabitants of those metal diving suits were genetically altered to become the Little Sisters' mindless, lumbering protectors. In their new role, these imposing figures were nicknamed ''Big Daddies.''
Entry=\nOnce genetically conditioned in the research labs of Point Prometheus, a Big Daddy's only purpose is to wander Rapture, searching for a Little Sister to protect. Once paired with a Little Sister, the Big Daddy follows her like a faithful dog and fiercely fights off anyone who approaches her.  A standard Big Daddy has extremely limited mental abilities and no free will.  They exist as docile ''sleepwalkers,'' who will fight to the death only if their Little Sister is threatened.

[Protector]
TopicType=Big Daddies and Little Sisters
FriendlyName=Roving Big Daddies
bHidden=true
Entry=Big Daddies are the powerful bodyguards of the Little Sisters.  They wander the streets of Rapture, watching over their Little Sisters and helping them search for ''angels'' -- decaying corpses which contain valuable ADAM.  Loyal and nearly mindless, a Big Daddy's only concern is the safety of his Little Sister. When the Little Sister is threatened, the Big Daddy will defend her with all his formidable strength.
Entry=\nBig Daddies don't always have their Little Sisters with them -- if a Big Daddy is alone, he'll head to a nearby vent and summon a Little Sister to his side. There isn't much reward in attacking a Big Daddy who is not presently escorting a Little Sister.
Entry=\nThough you are a prototype Big Daddy yourself, the refinements to the production model Big Daddies present a formidable foe.  Be ready for a fight to the death if you engage one, and prepare with every advantage you may have -- Plasmids, traps, environmental hazards and security -- before you attack. 

[PrototypeBigDaddy]
TopicType=Big Daddies and Little Sisters
FriendlyName=Subject Delta
bHidden=true
Entry=You are Subject Delta, a prototype 'Big Daddy' created in Ryan Industries' Protector / Gatherer  program. The original Big Daddy prototypes (called the Alpha Series) were leaner and more agile than the mass-produced models that came later, and each was bonded to a single Little Sister.
Entry=\nYou were apprehended after discovering Rapture during a diving expedition. Knowing they couldn't release you back to the surface to reveal the secrets of Rapture, you were ''volunteered'' as a subject for the experimental program. You were the first Big Daddy successfully pair-bonded to a 'Little Sister,' designed to protect her - and only her - with your life.
Entry=\nIn Rapture, you are something entirely unique...

[RoleOfLittleSister]
TopicType=Big Daddies and Little Sisters
FriendlyName=Little Sisters
bHidden=true
Entry=ADAM became the most valuable commodity in Rapture both because of its immense power, and because of its scarcity: once ADAM is injected into someone, it remains in their body indefinitely. If the Splicer dies, their ADAM dies with them.
Entry=\nThe Little Sisters are the solution to this problem. Little Sisters are young girls who have had the ADAM-producing sea slug implanted into their bodies. With the slug implanted, the Little Sisters are able to draw ADAM out of a dead body's bloodstream, ingest it, and process it back into usable ADAM.
Entry=\nAlong with this processing ability, the ADAM slug constantly produces a stem cell-like substance which instantly regenerates any damage done to the Little Sisters, such as from bullets, flames, or other attacks. But like a run-of-the-mill Splicer, exposure to ADAM also drives the Little Sisters completely mad.
Entry=\nLittle Sisters have only one purpose: to search out corpses containing ADAM, extract their blood, and process it back into a usable ADAM payload. Feeling remorse for her role in their creation, Doctor Tenenbaum developed a Plasmid which allows the user to purify Little Sisters, reversing the effects of ADAM exposure on their bodies and minds, but destroying the valuable ADAM slug in the process.


[Gatherer]
TopicType=Big Daddies and Little Sisters
FriendlyName=Roving Little Sisters
bHidden=true
Entry=The Little Sisters move through Rapture and collect ADAM from corpses.  After collecting ADAM, they return to their vents.  
Entry=\nThe ADAM from Little Sisters is necessary for improving your character. Unfortunately, they are always protected by a powerful Big Daddy that will keep them safe at all costs.  You must dispose of her bodyguard if you hope to get close to the Little Sister yourself.
Entry=\nOnce you have done this, you can Adopt the Little Sister as your own and use her to Gather ADAM from ADAM Corpses...
Entry=\nOr you can Harvest her immediately for a large ADAM reward.  

[AdoptingALittleSister]
TopicType=Big Daddies and Little Sisters
FriendlyName=Adopting Little Sisters
bHidden=true
Entry=Once you have defeated her protector, a Little Sister will be defenseless.  However, Little Sisters have been conditioned to trust Big Daddies and, as one yourself, you can use this trust to your advantage.
Entry=\nPress <Mapping=HandleReload> to Adopt the Little Sister, bonding her to you and placing her directly on your back.  Once Adopted, the Little Sister and you act as a team.  She'll lead you to the ADAM and it is your job to keep her safe from the Splicers of Rapture.  Press and hold <Mapping=HandleReload> to ask her to lead you of one of Rapture's many ''angels,'' dead bodies that hold valuable ADAM hidden inside.
Entry=\nOnce you have Adopted a Little Sister, you must resolve her before you can Adopt another one.  This can be done by finding any of the ''hidey holes'' scattered around Rapture -- special Vents that the Little Sisters use to traverse Rapture in safety.  When standing in front of a Vent, you will be given the final choice to Rescue her, purging her of her ADAM-induced madness, or Harvest her, taking all of her valuable ADAM for yourself.  Little Sisters cannot survive the Harvesting process.
Entry=\nVents are the ONLY place you can Rescue a Little Sister, but you can Harvest her any time she is on the ground.

[GatheringAdam]
TopicType=Big Daddies and Little Sisters
FriendlyName=Gathering ADAM
bHidden=true
Entry=Once you have Adopted a Little Sister, you can Gather ADAM from Rapture's many ''angels,'' dead bodies that hold valuable ADAM hidden inside.  Little Sisters are the only ones that can Gather and process this ADAM and, as a reward, she will give you some each time she completes her task. 
Entry=\nPress and hold <Mapping=HandleReload> to ask her to lead you to an ADAM-filled corpse and follow the glowing trail that appears in the world.  This will lead you to the body itself, which you can recognize by its distict white glow.  These bodies are also visible on your Map.
Entry=\nPress <Mapping=HandleReload> while looking at the corpse to set her down and start her Gathering.  Be careful!  Gathering from a corpse attracts Splicers, hungry for the ADAM the Little Sister possesses.  It is your job to keep her safe.  Prepare yourself before putting her down by setting traps, hacking security elements and checking the environment for any other advantage, such as oil slicks or explosive objects.
Entry=\nGathering takes time.  A red Gather Meter will appear on the left side of the screen and gradually fill up as she goes about her task.  If a Splicer makes it through your defenses, she'll get distracted and the meter will stop.  Keep them off of her, or the Gather will take longer.  More time means more Splicers to fight!
Entry=\nOnce she is done, press <Mapping=HandleReload> to pick her back up and claim your ADAM.  If you fall in battle, the Gather will be canceled and the Little Sister will run to your Vita-Chamber to reunite with you.  Be sure to pick her up before moving on.
Entry=\nEach Little Sister can only Gather twice before she needs to return to a Vent.  Take her to the nearest one to resolve her.  You will not be able to Adopt another until you do.

[ResolvingALittleSister]
TopicType=Big Daddies and Little Sisters
FriendlyName=Resolving Little Sisters
bHidden=true
Entry=Once you have Adopted a Little Sister, she is bonded to you.  You will not be able to Adopt another until you resolve her.
Entry=\nThis can be done in two ways.  Any time the Little Sister is on the ground, you can Harvest her.  This removes the valuable ADAM slug from her body and nets you a large amount of ADAM, but she will not survive the process.  If you want to Rescue her, however, you must find any of the Vents that are scattered around the city.
Entry=\nA Little Sister who has done two Gathers can lead you to the nearest Vent.  Press and hold <Mapping=HandleReload> to ask her to lead the way.
Entry=\nWhen standing in front of a Vent, you will be given the final choice to Rescue her, purging her of her ADAM-induced madness, or Harvest her, taking her valuable ADAM for yourself.  Little Sisters cannot survive the Harvesting process.  Rescuing gets you a much smaller amount of ADAM, but the Little Sisters may make it worth your while.

[BigSisterRevenge]
TopicType=Big Daddies and Little Sisters
FriendlyName=Big Sister is Watching
bHidden=true
Entry=Someone is watching over the Little Sisters of Rapture.  Someone more powerful than the Big Daddies.
Entry=\nThe Big Sisters keep watch on all of Rapture's special children and they do not take kindly to interference.  Whenever you Harvest or Save a Little Sister, there is a chance a Big Sister will take notice and come for you.
Entry=\nOnce one does, be ready to fight for your life.  Big Sisters are strong, fast and have the destructive power of multiple Plasmids at their disposal.  Worse yet, once a Big Sister has come for you, she will hunt you relentlessly and find you wherever you run.  You must defeat her to proceed. 
Entry=\nWhen you hear her distinctive scream, prepare yourself.  Get to a good area to fight her and set up the situation to your advantage in the short time you have before she arrives.
Entry=\nWhen you do manage to defeat her, make sure to search her body.  As former Little Sisters, you can still recover some valuable ADAM from them.

[Booty]
TopicType=Big Daddies and Little Sisters
FriendlyName=ADAM Corpses
bHidden=true
Entry=ADAM Corpses are the ''angels'' where Little Sisters gather their ADAM. Bring a Little Sister to an ADAM Corpse to have her gather ADAM for you - but be careful, as this will draw attention from Splicers.
Entry=\nADAM Corpses are visible on your MAP.  While you have a Little Sister with you, these bodies will also glow. To have a Little Sister guide you to an ADAM Corpse, press and hold <Mapping=HandleReload>.  Just follow the glowing trail!
Entry=\nIf you have a Little Sister with you, you can set her down on an ADAM Corpse to Gather ADAM by pressing <Mapping=HandleReload>.  This will attract Splicers, so be ready for a fight!

[Vent]
TopicType=Big Daddies and Little Sisters
FriendlyName=Little Sister Vents
bHidden=true
Entry=Vents are how Little Sisters safely travel around Rapture without their Big Daddies.
Entry=\nWhen you bring an Adopted Little Sister to a Vent, you will be given the final choice to Rescue her, purging her of her ADAM-induced madness, or Harvest her, taking her valuable ADAM for yourself.  Little Sisters cannot survive the Harvesting process.  Rescuing gets you a much smaller amount of ADAM, but the Little Sisters may make it worth your while.
Entry=\nA Little Sister who has done two Gathers can lead you to the nearest Vent.  Press and hold <Mapping=HandleReload> to ask her to lead the way.


[DistanceHackTool]
TopicType=Hacking
FriendlyName=Hack Tool
bHidden=true
Entry=This miracle device lets you subvert the many machines of Rapture for help, protection and other benefits.  
Entry=\nPress <Mapping=Fire> to fire at any hackable machine.  The reticle will only turn red over valid targets.
Entry=\nPress <Mapping=GunButtAndDash> for a quick melee attack.
Entry=\n
Entry=\nBase ammo: Hack Dart -- Hacks machines at a distance.  Once the Dart makes contact with a machine, the Hack Game will begin.
Entry=\nAlternate ammo: Auto-Hack Dart -- Bypasses a machine's defenses to automatically hack a machine with no additional work required!
Entry=\nAlternate ammo: Mini-Turrets -- Drops a turret that will automatically fire at your enemies.  These only last a set amount of time before auto-detonating.

[HowToHacking]
TopicType=Hacking
FriendlyName=Completing a Hack
bHidden=true
Entry=Rapture's many machines can be rewired and subverted for a variety of helpful effects -- but you will need to hack them first.
Entry=\nFire a Hack Dart to begin hacking a machine at a distance, or just walk up to it and press <Mapping=HackHarvestAndExitScout>.  Either of these will begin the Hack Game.
Entry=\nTo sucessfully hack a machine, you simply need to stop the needle on the green or blue zone.  Green will proceed to the next board of the game, or finish the hack on the last board.  Blue does the same, with the addition of a machine-specific bonus.
Entry=\nLanding in a red zone will end the hack and set off an alarm.  Landing in a white zone will end the hack and give you a nasty shock.
Entry=\nYou only have a limited number of passes with the hack needle, so pay attention to the number displayed at the bottom of the board.
Entry=\nThe Hack Game proceeds in real time.  Enemies and security may still attack, but you can also move as well.  Use this to your advantage and stay out of the line of fire while attempting a hack.

[HackableMachines]
TopicType=Hacking
FriendlyName=Hackable Machines
bHidden=true
Entry=Rapture has a large variety of machines that can be hacked for your benefit.
Entry=\nHacked Security Cameras will set off friendly alarms, sending bots after your enemies.
Entry=\nHacked Turrets will attack any enemy that wanders near.
Entry=\nHacked Vending Machines offer cheaper prices and reveal rare items for purchase.
Entry=\nHacked Safes allow you access to their valuable contents.
Entry=\nHacked Security Bots will follow you and fight for you.
Entry=\nHacked Health Stations offer cheaper healing.

[BonusHacking]
TopicType=Hacking
FriendlyName=Blue Bonus Hacking
bHidden=true
Entry=Many machines have Blue Zones in their Hack Game.  Landing on these zones counts as a success, as well as giving you a machine-specific bonus.  Below is a list of the bonuses for each.
Entry=\nSecurity Cameras = Longer friendly alarm.
Entry=\nTurrets = Additional damage.
Entry=\nVending Machines = Free items.
Entry=\nSafes = Additional money.
Entry=\nSecurity Bots = Additional damage.
Entry=\nHealth Stations = Free First Aid Kit.
Entry=\nSome machines have more than one Blue Zone while hacking, leading to stacked bonus rewards.

[HackingDifficulty]
TopicType=Hacking
FriendlyName=Hacking Difficulty
bHidden=true
Entry=As you progress through Rapture, hacking may become more difficult.  If you find that it has become too hard, you can improve your chances by installing a variety of Gene Tonics that can make hacking less difficult.  Many of these can be found for purchase at a Gatherer's Garden, but all will cost ADAM.



[SecurityOverview]
TopicType=Security System
FriendlyName=Security System Overview
bHidden=true
Entry=When a Security Camera emits a bright cone of white light, it has caught a glimpse of you and is trying to focus on you. If you stay in its field of view for a few seconds it will see you clearly and sound an alarm.  If you duck out of sight before the light turns red, the camera will soon return to its unalerted state.
Entry=\nWhile the alarm is on, Security Bots will seek you out and try to kill you.  Alarms typically last for a while, but can be manually turned off at a Security Shutdown Panel.  If you shut off the system at a Shutdown Panel the bots go dormant and can then be hacked.  When the alarm ends, any active Security Bots fly away.
Entry=\nYou can also end an Alarm by successfully hacking the device that triggered it.  In this case, however, the active bots will fly home, instead of going dormant.
Entry=\nCameras can be destroyed with your weapons. Armor-Piercing or Electrical attacks are most effective.  The Security Command Plasmid can also be used to distract or retarget enemy Security.
Entry=\nYou can also Hack Security Bots, Cameras and Turrets, so think twice about destroying them!

[SecurityCamera]
TopicType=Security System
FriendlyName=Security Camera
bHidden=true
Entry=Security Cameras are the eyes of the security system.  If you are spotted by a Security Camera and stay in its field of vision for a few seconds, it will sound an alarm and summon Security Bots to attack.
Entry=\nIf you successfully hack a Security Camera, it will ignore you and start looking for enemies.  If an enemy stays in its field of vision for long enough, the alarm will sound and Security Bots will come to attack it!
Entry=\nYou can Hack Security Cameras and get them to work for you, so think twice about destroying them!
Entry=\nGetting a BLUE BONUS section while hacking a Camera will increase the duration of the Alarm when it sees an enemy Splicer!

[Security]
TopicType=Security System
FriendlyName=Shutdown Panels
bHidden=true
Entry=Bot Shutdown Panels are used to cancel active Security Alarms and shut down any Security Bots that have been summoned by the alarm.  Using a Bot Shutdown Panel is free.
Entry=\nAlarms can also be canceled by successfully hacking the device that originally triggered it, whether it was a Security Camera or a failed hack on another machine.

[SecurityBot]
TopicType=Security System
FriendlyName=Security Bots
bHidden=true
Entry=Security Bots are the muscle of the security system.  When an alarm sounds, they will go to the location where the camera last saw you.  You can hide from them, but cameras will tell them where you are if you are seen again during an active alarm.
Entry=\nIf you cancel an alarm early with a Security Shutdown Panel, the bot is instantly shut down and goes into a dormant state.
Entry=\nWhen dormant, bots can be proximity hacked by pressing <Mapping=HackHarvestAndExitScout>.  You can also hack them at any time from a distance by using the Hack Tool.
Entry=\nIf you successfully hack a Security Bot, it will reactivate and follow you around, helping fight your enemies. Hacked Security Bots will not attack your enemies unprovoked, but will join in attacking any target you yourself have attacked.
Entry=\nGetting a BLUE BONUS section while hacking a Security Bot will cause it to do more damage to your enemies!


[Turret]
TopicType=Security System
FriendlyName=Turrets
bHidden=true
Entry=Security turrets are gun emplacements that protect areas of Rapture.  They will attack you on sight, regardless of whether a security alarm is sounding.
Entry=\nTurrets can be proximity hacked when they are unaware of you, or when Shocked or Frozen, by pressing <Mapping=HackHarvestAndExitScout>.  You can also Hack them at any time from a distance by using the Hack Tool.
Entry=\nWhen you successfully hack a turret, it will thereafter ignore you and attack your enemies instead.
Entry=\nGetting a BLUE BONUS section while hacking a Turret will cause it to do more damage to your enemies!

[HackingSecurity]
TopicType=Security System
FriendlyName=Hacking Security
bHidden=true



[Research]
TopicType=Research System
FriendlyName=Researching Enemies
bHidden=true
Entry=You can Research enemies and gain a variety of bonuses by using the Research Camera.
Entry=\nThe Research Camera is equipped like a weapon, but requires no ammunition.
Entry=\nResearching an enemy initiates a timer.  While the timer is active, engaging the enemy in combat will earn you Research Points.  Creative and unique fighting techniques will result in more research points being awarded; repeating the same actions will become less and less effective.
Entry=\nEach enemy can only be researched once, so score as many points as you can while the camera is rolling.  If you miss your opportunity, you can also take a picture of a defeated enemy, though you will get minimal points.
Entry=\nResearching each type of enemy will net you different bonuses -- Gene Tonics, Upgrades and more! Once you have researched an enemy once, check the Research screen in the <Mapping=ShowHelp> Menu for a full rundown of the rewards that lie ahead.

[ResearchCamera]
TopicType=Research System
FriendlyName=Research Camera
bHidden=true
Entry=Press <Mapping=Fire> while the Research Camera is equipped to begin a Research session.
Entry=\nResearching an enemy initiates a timer.  While the timer is active, engaging the enemy in combat will earn you Research Points.  Creative and unique fighting techniques will result in more research points being awarded; repeating the same actions will become less and less effective.
Entry=\nEach enemy can only be researched once, so score as many points as you can while the camera is rolling.  If you miss your opportunity, you can also take a picture of a defeated enemy, though you will get minimal points.
Entry=\nResearching each type of enemy will net you different bonuses -- Gene Tonics, Upgrades and more! Once you have researched an enemy once, check the Research screen in the <Mapping=ShowHelp> Menu for a full rundown of the rewards that lie ahead.
Entry=\nThe Research Camera requires no ammunition.

[ResearchRewards]
TopicType=Research System
FriendlyName=Research Rewards
bHidden=true
Entry=Researching each type of enemy will net you different bonuses -- Gene Tonics, Upgrades and more! Once you have researched an enemy once, check the Research screen in the <Mapping=ShowHelp> Menu for a full rundown of the rewards that lie ahead.
Entry=\nAll of these rewards can ONLY be attained through the Research System, so get out there and start researching!

[ResearchingFaster]
TopicType=Research System
FriendlyName=Research Progress
bHidden=true
Entry=Tagging an enemy with the Research Camera is just the start of research.  To make progress quickly, you will need to use a variety of tools, techniques and combinations in battle.
Entry=\nIf you find your research progress seems too slow, try using your abilities in combination.  For example, stunning an enemy with Electro Bolt and then hitting him with your Drill gets you more progress than either of these things individually.
Entry=\nWatch the Research Meter on the left side of the screen during a Research Session.  Whenever it flashes, you have done something that gives you a large amount of progress.  Discover these techniques and use them to make faster progress toward your research rewards!

[Splicers]
TopicType=Enemies
FriendlyName=Splicer
bHidden=true
Entry=''Splicer'' is a term for the roving lunatics of Rapture, whose minds and bodies have been distorted by unchecked genetic manipulation through the use of substance ADAM. Once addicted to ADAM, a Splicer's only concern is procuring more. They see anyone unfamiliar as a potential source for a score -- your metal-suited self included.
Entry=\nSplicers arm themselves with any weapon they might come across, from simple bludgeons to pistols and machine guns. Some Splicers have molded their bodies into new forms, giving them enormous muscle mass, the ability to crawl on walls and ceilings, and even the power of teleportation.
Entry=\nA system of mind-controlling pheromones allow those with control of Rapture to guide Splicers on the attack. Splicers may work together, but make no mistake -- after the effects of ADAM take hold, a Splicer cannot be reasoned with.

[CeilingCrawler]
TopicType=Enemies
FriendlyName=Spider Splicer
bHidden=true
Entry=Spider Splicers have injected a Gene Tonic cocktail that distends their limbs and loosens their joints, allowing them to wriggle through the vents and crawlspaces of Rapture. After sneaking up on their prey, they descend from above and drop in for the kill. When a Spider Splicer attacks, keep an eye on the walls and ceilings, and watch out for the flying hooks they wing at their targets from afar!
Entry=\n''Splicer'' is a term for the inhabitants of Rapture who lost their humanity from using too many Plasmids.

[RangedAggressor]
TopicType=Enemies
FriendlyName=Leadhead Splicer
bHidden=true
Entry=Despite the ravages of ADAM withdrawal, Leadhead Splicers have retained enough fine motor control to aim and fire pistols, shotguns and machine guns. A Leadhead Splicer puts survival first, and will run for cover during a firefight. Their deadly accuracy makes even a single Leadhead Splicer a formidable threat.
Entry=\n''Splicer'' is a term for the inhabitants of Rapture who lost their humanity from using too many Plasmids.

[Assassin]
TopicType=Enemies
FriendlyName=Houdini Splicer
bHidden=true
Entry=Now you see it, now you don't! The Houdini Splicer can disappear in the blink of an eye, teleport to a better vantage point, then hurl a volley of fireballs at his disoriented target. When confronted by a Houdini Splicer, your best bet is to immobilize the bugger with a quick shock from Electro Bolt, or a freezing Winter Blast.
Entry=\nThe act of teleportation is accomplished when the Houdini Splicer disintegrates into a mist of molecules invisible to the naked eye. This atomized matter is whisked to a new location, then reconstituted bodily in the Houdini's original form. Watch for the telltale cloud of coalescing viscera to signal where the Houdini will reappear.
Entry=\n''Splicer'' is a term for the inhabitants of Rapture who lost their humanity from using too many Plasmids.

[MeleeThug]
TopicType=Enemies
FriendlyName=Thuggish Splicer
bHidden=true
Entry=Thuggish Splicers rely on brute force, bashing their enemies with any implement that comes to hand (a wrench or lead pipe being popular choices). Thuggish Splicers are perhaps the most far-gone, having lost the ability to manipulate a gun's trigger. Thuggish Splicers throw themselves at their target without regard for their own safety, making them a deadly and relentless foe.
Entry=\n''Splicer'' is a term for the inhabitants of Rapture who lost their humanity from using too many Plasmids.

[BigSister]
TopicType=Enemies
FriendlyName=Big Sisters
bHidden=true
Entry=A Big Sister combines the strength of a Big Daddy with the ADAM-draining abilities of a Little Sister. They are armored, deadly, and can survive out in the ocean, but are also able to drain ADAM from corpses to power Plasmid abilities. When a Little Sister is abducted by a Splicer, the Big Sisters are the last line of defense, emerging from the shadows to hunt down the attacker. The Little Sister is then returned to the system to start her work anew, or the ADAM itself is recovered from the offending Splicer.
Entry=\nAlong with dashing and slashing attacks, Big Sisters may wield genetic abilities like Incinerate and Telekinesis. Big Sisters are incredibly agile and can jump up to perch on walls like a Spider Splicer, catching their target unawares.

[Brute]
TopicType=Enemies
FriendlyName=Brute Splicer
bHidden=true
Entry=The top of the Splicer food chain, the Brute Splicer has grown his body to an enormous size. Valuing raw muscle mass over all else, the Brute Splicer bears down on his victims with a sudden shoulder charge, then finishes them off with a hail of vicious hammer blows.
Entry=\nYou may think you're safe at a distance, but watch out for his temper: he likes to throw things, too.

[MadDaddy]
TopicType=Enemies
FriendlyName=Alpha Series
bHidden=true
Entry=It took some time to get the Big Daddy formula right. The Alpha Series is evidence of years of false starts. Former test subjects for experimental Plasmids, these poor ''volunteers'' were then brainwashed and sealed into metal armor. Attempts to pair bond them with Little Sisters failed, leaving them as feral, barely-human wrecks. 
Entry=\nFiercely territorial, the Alpha Series now wander the halls of Fontaine Futuristics and Persephone Penal Colony, attacking anything that might intrude from the outside -- namely, you. They are prone to uncontrolled Plasmid outbursts, and tend to favor heavy munitions in fending off their foes.





[WeaponUpgrade]
TopicType=Weapons
FriendlyName=Power to the People Upgrades
bHidden=true
Entry=The ''Power to the People'' machines allow you to upgrade your weapons.  Each such machine can only be used ONE time, to acquire ONE of the listed Upgrades.  There are fewer stations than possible Upgrades, so choose wisely!
Entry=\nThere are three Upgrades for each weapon, but you must install the first two before the third is available.  
Entry=\nUpgrades vary from weapon to weapon.  Some add larger clip sizes or increased damage, while others remove limitations of the weapon itself.  The third Upgrade is usually extremely powerful and will add new abilities to your weapons!  For example, the third Drill Upgrade allows you to reflect bullets and projectiles, while the third Machine Gun Upgrade causes bullets to bounce off of surfaces and around corners.

[Drill]
TopicType=Weapons
FriendlyName=Drill
bHidden=true
Entry=Press <Mapping=Fire> or <Mapping=GunButtAndDash> to swing the Drill. 
Entry=\nThis is your strongest melee attack.  Use the Drill swing to conserve ammo.
Entry=\nPress and hold <Mapping=Fire> to spin up the Drill and do continuous damage to a target.
Entry=\Spinning the Drill does heavy damage, but consumes Fuel. If you run out, find more in the world or buy some from a Vending Machine.

[DrillDash]
TopicType=Weapons
FriendlyName=Drill Dash
bHidden=true
Entry=Tap <Mapping=Fire> and <Mapping=GunButtAndDash> to execute a Drill Dash.

[RivetGun]
TopicType=Weapons
FriendlyName=Rivet Gun
bHidden=true
Entry=Press <Mapping=Fire> to fire.
Entry=\nPress <Mapping=GunButtAndDash> for a quick melee attack.
Entry=\nBase ammo: Rivet -- Moderate amount of piercing damage.
Entry=\nAlternate ammo: Heavy Rivet -- Moderate amount of armor-piercing damage.  Especially deadly with Headshots.
Entry=\nAlternate ammo: Trap Rivet -- Will embed where fired and shoot a secondary rivet when an enemy nears.

[Shotgun]
TopicType=Weapons
FriendlyName=Shotgun
bHidden=true
Entry=Press <Mapping=Fire> to fire.
Entry=\nPress <Mapping=GunButtAndDash> for a quick melee attack.
Entry=\nFires a wide burst of pellets, most effective at shorter ranges.
Entry=\nBase ammo: 00 Buck -- Moderate amount of piercing damage.
Entry=\nAlternate ammo: Solid Slug -- Moderate amount of anti-personnel damage.  Can penetrate multiple targets.
Entry=\nAlternate ammo: Phosphorus Buck -- Sticks to enemies, causing them to panic, and will explode after a short time.


[GrenadeLauncher]
TopicType=Weapons
FriendlyName=Launcher
bHidden=true
Entry=Press <Mapping=Fire> to fire.
Entry=\nPress <Mapping=GunButtAndDash> for a quick melee attack.
Entry=\nLaunches a variety of grenades.
Entry=\nBase ammo: Fragmentation Grenade -- Large amount of piercing damage in a radius.
Entry=\nAlternate ammo: Proximity Mine -- A proximity mine that does a large amount of piercing damage in a radius when triggered.
Entry=\nAlternate ammo: Heat-seeking Rocket -- A guided rocket that does a large amount of heat damage in a radius.


[Speargun]
TopicType=Weapons
FriendlyName=Speargun
bHidden=true
Entry=Press <Mapping=Fire> to fire.
Entry=\nPress <Mapping=GunButtAndDash> for a quick melee attack.
Entry=\nFires highly accurate spears.  Its accuracy and higher head-shot bonus makes it an excellent sniper weapon.  Spears can be recovered from fallen foes.
Entry=\nBase ammo: Standard Spear -- Large amount of piercing damage.
Entry=\nAlternate ammo: Rocket Spear -- A spear equipped with a timed explosive device that will detonate after a short time.  The rocket trail will also set nearby objects on fire.
Entry=\nAlternate ammo: Trap Spear -- Creates an electric wire which, when triggered, does a large amount of electric damage.


[MachineGun]
TopicType=Weapons
FriendlyName=Machine Gun
bHidden=true
Entry=Press and hold <Mapping=Fire> to fire.
Entry=\nPress <Mapping=GunButtAndDash> for a quick melee attack.
Entry=\nFires a rapid spray of bullets. Very effective against groups or at close range.
Entry=\nBase ammo: .50 Caliber Rounds -- Small amount of piercing damage.
Entry=\nAlternate ammo: Anti-Personnel Rounds -- Small amount of anti-personnel damage.
Entry=\nAlternate ammo: Armor-Piercing Rounds -- Small amount of armor-piercing damage.

[Sinclair]
TopicType=People of Rapture
FriendlyName=Augustus Sinclair
bHidden=true
Entry=''You do business as long as I have, and you learn to pick a brand name from the writin' on the wall.''
Entry=\nAn entrepreneur who puts profit above all else - ethics, honesty, and even the lives of others.  Sinclair likes to keep a low profile and will happily exploit anyone and everyone in order to make a buck. In Rapture's heyday, Sinclair founded a number of money-making institutions through a firm called Sinclair Solutions, including the low-rent housing in Pauper's Drop and home testing of experimental Plasmids on desperate addicts.
Entry=\nAs Rapture started to fall down around him, he saw a business opportunity: to gather up all the amazing scientific advancements discovered by the great minds of the city, bring them back to the surface, and sell them off to the highest bidder.
Entry=\nHe needs you to secure his escape from Rapture, so that he can return to the surface and complete his plan. Unlike Andrew Ryan, he doesn't believe that altruism is evil, but simply unprofitable.  He's helping you to help himself.


[Tennenbaum]
TopicType=People of Rapture
FriendlyName=Brigid Tenenbaum
bHidden=true
Entry=''What makes a thing like me? I look at genes all day long, and never do I see the blueprint of sin.''
Entry=\nThe brilliant geneticist who discovered the miraculous substance known as ''ADAM'' inside a  sea-slug, and developed the process of implanting it into young girls to produce the Little Sisters.
Entry=\nBrigid Tenenbaum is a survivor: once icy and emotionless, she escaped the Holocaust by assisting her captors in their inhuman experiments on her own fellow prison camp inmates. She prospered in Rapture by corrupting a generation of innocent girls, sentencing them to be Little Sisters - and by extension, creating the ADAM addiction that destroyed the city. 
Entry=\nBut as Rapture fell, Tenenbaum had a change of heart, and experienced remorse for the first time. Since then, she has sought redemption. Long ago she developed a Plasmid to cure the Little Sisters, and worked to return them to humanity and to rescue them all from Rapture.
Entry=\nNow, she is trying to stop whomever is responsible for the creation of the new ones wandering Rapture.

[AndrewRyan]
TopicType=People of Rapture
FriendlyName=Andrew Ryan
bHidden=false
Entry=''What is the most vicious obscenity ever perpetrated on mankind? Slavery ... the Holocaust ... dictatorship ... No. It's the tool with which all that wickedness is built. Altruism.''
Entry=\nThe wealthy industrialist who founded the City of Rapture, Ryan envisioned the underwater city as a place where the finest minds of the surface world would gather to pursue their callings without government interference. As every citizen worked in his or her own self-interest, unhindered on moral, social, or legal grounds, Rapture society as a whole would become the greatest society on Earth.
Entry=\nBut as the realities of a society without moral boundaries bore down on Rapture and the city spiraled into chaos, Ryan flailed desperately to bring  it back under his control. Dissidents like Sofia Lamb simply 'disappeared'. Eventually, Ryan became the very thing that he built Rapture to escape - a dictator, ruling Rapture with an iron fist. 
Entry=\nWhen Frank Fontaine began threatening Ryan's position of power, Ryan seized his businesses, instituted strict city-wide curfews, and even began executing dissidents in Apollo Square. In 1960, a daring assassination plot ended in the death of Andrew Ryan. It had seemed that the utopian dream of Rapture died with him... until now.

[SofiaLamb]
TopicType=People of Rapture
FriendlyName=Sofia Lamb
bHidden=true
Entry=''Utopia is not a place... but a people. It will exist the moment we are fit to occupy it.''
Entry=\nSofia Lamb is both an Oxford-educated psychiatrist and philosophical idealist. She was brought to Rapture to counsel the populace. Her worldviews were shaped by her experiences aiding the survivors of the nuclear blast at Hiroshima. She herself was very near the blast, but miraculously survived - only to find that everyone she had met for the past several years was dead.
Entry=\nThe US justification for the bombing - the 'greater good' - was a perversion of her own beliefs. She believes that genetic biases toward the self have doomed the surface world, and so she sought refuge in the underwater city of Rapture.
Entry=\nHer intent in joining Ryan's great experiment was to transform the closed society into an enlightened one through psychiatry - ultimately to abolish human suffering amongst the Utopians. Her daughter, Eleanor, was raised in isolation from other children, intended as a genius-level intellect trained to promote Lamb's philosophy.  An underground religion began to form around her, born out of the city's disenfranchised, and Lamb took full advantage of it.
Entry=\nBut Lamb's collectivist ideals conflicted directly with those of Andrew Ryan, and she mysteriously vanished during the Fall of Rapture.  Later, she crossed paths with Subject Delta, murdering Eleanor's beloved bodyguard in order to retrieve her from his care.
Entry=\nNow that Ryan and Fontaine are gone, Lamb has returned - and it seems she has a new plan for Rapture...


[Grace]
TopicType=People of Rapture
FriendlyName=Grace Holloway
bHidden=true
Entry=''Blood divides us. It's blood that makes us strangers. But thanks to Doctor Lamb, we're all Family now.''
Entry=\nAn alluring torchlight singer at the Limbo Room jazz club in her more youthful days, Grace joined Sofia Lamb's cult-like organization during the fall of Rapture. All her life she longed to be a mother, and was overjoyed when she was able to adopt Eleanor Lamb when Lamb was detained by Ryan's agents. 
Entry=\nBut one night, Grace took Eleanor to a clandestine gathering of Lamb's followers in her absence, and Eleanor disappeared. Grace still pines after the missing girl, who was subsequently turned into a Little Sister after being abducted. 
Entry=\nShe harbors a deep resentment for anyone involved... including Subject Delta.

[Stanley]
TopicType=People of Rapture
FriendlyName=Stanley Poole
bHidden=true
Entry=''So I met with Sinclair today, of 'Sinclair Solutions'.  And he's got work for me, right? He flashes me these thousand-dollar Steinman teeth, sayin' this job will 'change history'...''
Entry=\nA self-described ''ace newsman'' who once worked for the Rapture Tribune, Stanley was employed by Andrew Ryan to infiltrate the Rapture Family - Lamb's organization. His charge was to find proof of Lamb's collectivist ideas beneath the veneer of private religion, and to sabotage her in any way he could along the way.  Over time, he became involved in far more aggressive tactics against dissidents in Rapture.
Entry=\nBut when Ryan was killed, Stanley found himself imprisoned within that lie, and has worked for Lamb ever since. Now, he seeks to hide the evidence of his crimes against her, and has enlisted Subject Delta to help him ensure that his past stays buried.

[GilAlexander]
TopicType=People of Rapture
FriendlyName=Gil Alexander
bHidden=true
Entry=''The end may be nigh... but for me, it's just more paperwork.''
Entry=\nAn ambitious young researcher in the early days of Fontaine Futuristics, specializing in mechanical and robotic engineering.  At the height of his career, he designed much of Rapture's automated security system, including the ubiquitous security bots. He constructed the mechanism which implanted ADAM slugs into Little Sisters, and ultimately, even assisted with the creation of the bond which links Subject Delta to Eleanor Lamb.
Entry=\nAfter the deaths of Fontaine, Ryan, and several of the city's key players, Alexander relished the opportunity to grab the title of the corporation's head scientist, taking over from Dr. Yi Suchong. But since the fall of Rapture, he came to see his own role in a new light and wished to make amends. Before long, he fell in with Sofia Lamb, who used his guilt to manipulate him into volunteering for an experiment of her own.


[EleanorLamb]
TopicType=People of Rapture
FriendlyName=Eleanor Lamb
bHidden=true
Entry=''Love is just a chemical. We give it meaning by choice.''
Entry=\nBorn in Rapture to Sofia Lamb, Eleanor's early childhood lacked a father or any other adult influence.  Her genius was carefully cultivated in order to build the perfect vessel for Lamb's own altruistic philosophy. Eleanor was isolated from other children for years, but was headstrong and rebellious, teaching herself to disable Lamb's sophisticated security measures and explore the city on her own. Her true aim was to see the surface world her mother abandoned - a place about which she has only read.
Entry=\nWhen the elder Lamb was incarcerated by Andrew Ryan, a series of events led to Eleanor becoming a Little Sister - a ghoulish, ADAM-carrying hybrid. Ultimately she was bonded to Subject Delta as his personal ward, and was psychologically conditioned to love him as her father. 
Entry=\nAfter her mother murdered Subject Delta to reclaim Eleanor, she spent  many years in Lamb's 'care'. But taking control of Rapture had changed Lamb. She managed to rehabilitate Eleanor psychologically - but regards the girl's physical condition as a blessing in disguise, subjecting Eleanor to many experiments involving ADAM.
Entry=\nEleanor has been trying to escape ever since, and considers Subject Delta both father and ally in this plan.



[AdonisResort]
TopicType=Places in Rapture
FriendlyName=Adonis Luxury Resort
bHidden=false
Entry=Plasmids offered each citizen of Rapture a chance at physical perfection. But when one of Rapture's elite wanted to feel pampered, they would book a suite at the Adonis Luxury Resort. The ageless marble of classical Greek baths meets the art deco resplendence of Rapture's modern tastes. Spa treatments enhanced by the controlled use of Plasmid abilities kept patrons of The Adonis feeling their very best.
Entry=\nRadiating out from the grand swimming pool, guests would find intensive Plasmid therapy rooms, a sauna, and the cutting-edge restorative technology of the Vita-Chamber. A private bathysphere docking ring provides easy access to The Adonis's main lobby, and to the sumptuous fare of Demeter's Banquet Hall beyond.

[AtlanticExpress]
TopicType=Places in Rapture
FriendlyName=The Atlantic Express
bHidden=true
Entry=The outmoded railway system that runs through the oldest districts of Rapture. Built by Prentice Mill in the city's early days, the Atlantic Express was once the Rapture populace's primary mode of transport. After the introduction of the Rapture Metro system of personal bathyspheres the Atlantic Express fell out of favor and went bankrupt. The tracks remain largely intact, if disused.
Entry=\nThe Atlantic Express Maintenance Depot was home to the drafting offices of the train company's brilliant mechanical engineers, as well as an enormous switching roundhouse, and a central station for passengers headed to all points on the Express's train lines.

[RyanAmusements]
TopicType=Places in Rapture
FriendlyName=Ryan Amusements
bHidden=true
Entry=A theme park dedicated to educating the children of Rapture about the dangers of the surface world. Andrew Ryan was convinced that children born in Rapture would want to leave the city as they grew older, which for reasons of secrecy he couldn't permit. He commissioned Carlson Fiddle, a prominent mechanical engineer, to architect an amusement park filled with enthralling - but terrifying - animated scenes depicting the horrors of the world that Rapture left behind.
Entry=\nRyan Amusements revolves around the elaborate ''Journey to the Surface'' theme ride. The Hall of the Future once enticed Rapture citizens with the newest technological and genetical advances. A park gift shop and the El Dorado Lounge restaurant round out the park's attractions.


[PaupersDrop]
TopicType=Places in Rapture
FriendlyName=Pauper's Drop
bHidden=true
Entry=''The worst neighborhood in Rapture.''
Entry=\nThe Drop was originally built as a temporary worker's camp during the construction of the Atlantic Express. Once the rail line was completed, however, the workers found that they couldn't afford to live anywhere else in Rapture, and the settlement under the tracks became permanent.
Entry=\nMost residents of the Drop lived in the sprawling Sinclair Deluxe tenement building. The Fishbowl Diner was a popular lunch counter for working stiffs. A pawn shop, King Pawn, and free clinics can be found in the Drop's downtown. Skid Row is home to a once-bustling marketplace for scavenged and otherwise illicit goods. The marketplace is anchored by the Reliable Pharmacy at one end, and the Limbo Room jazz club at the other.

[SirenAlley]
TopicType=Places in Rapture
FriendlyName=Siren Alley
bHidden=true
Entry=A hotbed of vice built on the ruins of Rapture's original masonry district. The great draftsmen, designers, and builders of Rapture once called this place home, expressing their creativity and skill in the construction of the buildings here.  As Rapture society declined and the city stopped expanding, demand for new architecture dried up. The once-beautiful buildings, now abandoned, became occupied by brothels, speakeasies, and bootleg Plasmid distilleries.
Entry=\nThe Pink Pearl brothel towers over Siren Alley. Pumping Station 5, responsible for regulating the water pressure throughout Rapture, can be found at the heart of the district. Following the death of Andrew Ryan, the Reverend Simon Wales constructed a makeshift cathedral there.

[DionysusPark]
TopicType=Places in Rapture
FriendlyName=Dionysus Park
bHidden=true
Entry=Sofia Lamb's arts and leisure district frequented by young lovebirds and avant garde artists. Acting as the boardwalk in contrast to Arcadia's woodlands, and exploited by Lamb for cultural cachet, Dionysus Park featured special, thematically guided events celebrating arts and entertainment.
Entry=\nA number of years ago the entire district flooded, drowning the resident followers of Lamb. Now that Dionysus Park has been drained Splicers are trickling back in to reclaim the place, looking for any soggy valuables that might remain.
Entry=\nCourting couples were once drawn to Dionysus Park's opulent carousel, to the Triton Movie Theater, and to the district's romantic fountain and garden promenades. A number of high-class art galleries surround the main thoroughfare.

[FontaineFuturistics]
TopicType=Places in Rapture
FriendlyName=Fontaine Futuristics
bHidden=true
Entry=The corporate headquarters and research labs that produced Plasmids, Big Daddies, and other high technology for Rapture. As tensions rose prior to the fall of 1959, Andrew Ryan took control of Fontaine Futuristics in an attempt to put an end to the two men's power struggle. After being seized by the Rapture central council, work continued here under the auspices of Ryan Industries until the death of Ryan himself. Gil Alexander, an ambitious scientist and inventor, took this opportunity to grab control of the entire facility, twisting the security systems to his own ends, and has resided here ever since.
Entry=\nA grand atrium anchors the corporate offices and Plasmid demonstration halls. An adjacent site contains the labs where many of Rapture's advances in genetic and robotic technology were discovered.

[Persephone]
TopicType=Places in Rapture
FriendlyName=Persephone
bHidden=true
Entry=A secret penal colony hidden away underneath Rapture, constructed to hold any political dissidents that opposed Ryan. Rapture's original plan included no prison, but the need for one became apparent almost immediately, despite Ryan's own distaste for the idea. Augustus Sinclair anticipated this need and built Persephone soon after Rapture's founding. In short order, Ryan populated the place with a bustling prisoner population. Dissidents were effectively ''disappeared'' from Rapture society, giving Sinclair free rein to use them as experimental test subjects or simple slave labor.
Entry=\nOne such prisoner was Sofia Lamb, sent to Persephone for speaking out against Ryan's principles of self-interest. Lamb began offering her psychological therapy services to the other inmates, and eventually built up a strong enough following to stage a revolt, throwing Sinclair and his supporters out of Persephone entirely. The last Sinclair saw of Persephone, Lamb had taken control of the place and all its inhabitants, to unknown ends...
Entry=\nAn imposing security tower overlooks the Holding Wing. The Infirmary and Therapy Wings provide treatment for Persephone's inmates. Sinclair's clandestine escape vessel is stored at the facility's docking platform in the center.




[bandages]
TopicType=Snacks and Medicinals
FriendlyName=Bandages
bHidden=true
Entry=Gauze bandages in Rapture are treated with a variety of gene-altering substances which instantly repair your body at the cellular level. Applying a roll of bandages to your wounds will provide a modest boost in Health.  They are used immediately when picked up.

[twinkie]
TopicType=Snacks and Medicinals
FriendlyName=Creme-filled Cake
bHidden=true
Entry=''A creamy treat, fresh as can be? Thanks, mom!'' -- Creme-Filled Cake advertising copy
Entry=\nThis delicious creme-filled cake will give you a small amount of Health.  Like all food and drink, it is consumed immediately when picked up.

[chips]
TopicType=Snacks and Medicinals
FriendlyName=Salty's Chips
bHidden=true
Entry=''Captain Salty, a man of the sea; the perfect potato chips, Cap'n Salty's they be!'' -- Salty's Chips advertising copy
Entry=\nA bag of delicious potato chips will give you a small amount of Health.  Like all food and drink, they are consumed immediately when picked up.

[vodka]
TopicType=Snacks and Medicinals
FriendlyName=Chechnya Vodka
bHidden=true
Entry=''The occasion is right... for Chechnya.'' -- Chechnya Vodka advertising copy
Entry=\nA bottle of vodka will restore a small amount of Health, but drain a small amount of EVE.  Like all food and drink, it is consumed immediately when picked up.

[whiskey]
TopicType=Snacks and Medicinals
FriendlyName=Old Tom Whiskey
bHidden=true
Entry=''It packs a wallop!'' -- Old Tom Whiskey advertising copy
Entry=\nA bottle of whiskey will restore a small amount of Health, but drain a small amount of EVE.  Like all food and drink, it is consumed immediately when picked up.

[wine]
TopicType=Snacks and Medicinals
FriendlyName=Tate Merlot
bHidden=true
Entry=''You want the best? You drink Tate. Could it be any simpler?'' -- Dan Tate, proprietor, Tate Wineries
Entry=\nA bottle of Merlot will restore a small amount of Health, but drain a small amount of EVE.  Like all food and drink, it is consumed immediately when picked up.

[Gin]
TopicType=Snacks and Medicinals
FriendlyName=McHale Gin
bHidden=true
