Description=When Lamb suffocated Eleanor, your mutual bond broke.  Your body is now shutting down and you may not have long to live.  Lamb has taken advantage of this to secure you in one of Persephone Penal's holding rooms.\n\nEleanor, weak as she is, is the only one who can help you now.  She has used her power over the Little Sisters to transfer control of one to you.\n\nUse the Little Sister's ability to crawl through Rapture's Vents to escape the Holding Room.
ReleventLevelLabel=Eden
LevelFriendlyName=Lamb
ArrowActor=Marker_Vent_03B
ArrowActorLevelLabel=Eden
HintReminderTime=60
QuestHints=(HintName=EDN_EscapeCellHint1, Text="Walk up to the Vent on the wall and press <Mapping=Use> to crawl through it.")

